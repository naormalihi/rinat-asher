<style>
:root {
  --bg:#F7F6F2; --card:#FFFFFF; --subtle:#F0EFE9; --hover:#ECEAE2;
  --border:#E2E0D8; --border-mid:#C8C4B8;
  --t1:#1A1916; --t2:#4A4840; --t3:#8A8778; --t4:#B0ADA3;
  --accent:#8B6A3E; --accent2:#C4965A; --accent-bg:#F5EFE6; --accent-bd:#DCC9A8;
  --green:#4A7C59; --green-bg:#EDF4EF;
  --r-lg:20px; --r-md:12px; --r-sm:8px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  --sh-lg:0 16px 48px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans','Heebo',sans-serif;background:var(--bg);color:var(--t1);direction:rtl;-webkit-font-smoothing:antialiased;min-height:100vh}

/* LOADING */
#ld{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .35s}
#ld.out{opacity:0;pointer-events:none}
.ring{width:36px;height:36px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(247,246,242,.88);backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.nav-brand span{font-weight:300;color:var(--t3);margin-right:4px}
.nav-r{display:flex;align-items:center;gap:10px}
.pills{display:flex;background:var(--subtle);border:1px solid var(--border);border-radius:50px;padding:3px;gap:2px}
.pill{padding:5px 16px;border-radius:50px;border:none;background:transparent;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .18s}
.pill.on{background:var(--card);color:var(--t1);box-shadow:var(--sh-sm);font-weight:600}
.pill:hover:not(.on){color:var(--t2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border-mid);transition:background .3s}
.dot.on{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}

/* SCREENS */
.scr{display:none}.scr.on{display:block}

/* ═══ PUBLIC ═══ */
#pub{max-width:560px;margin:0 auto;padding:32px 16px 64px}
.fu{animation:fu .5s ease both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.hero{text-align:center;padding:40px 24px 36px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-md);margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:var(--r-lg) var(--r-lg) 0 0}
.eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--t4);margin-bottom:10px}
.h-title{font-family:'Frank Ruhl Libre',serif;font-size:2rem;font-weight:900;color:var(--t1);line-height:1.1;letter-spacing:-.02em;margin-bottom:6px}
.h-sub{font-size:.8rem;color:var(--t4);margin-bottom:28px;letter-spacing:.05em}

.pchip{display:inline-flex;align-items:center;gap:8px;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:50px;padding:8px 20px;margin-bottom:28px}
.pchip-lbl{font-size:.7rem;color:var(--accent);font-weight:600;letter-spacing:.08em}
.pchip-name{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;font-weight:700;color:var(--accent)}
.pchip-div{width:1px;height:14px;background:var(--accent-bd)}

.trow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.tblk{text-align:center;padding:12px 16px}
.tblk-lbl{font-size:.65rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t4);margin-bottom:6px}
.tblk-val{font-family:'DM Serif Display','Frank Ruhl Libre',serif;font-size:2.6rem;color:var(--t1);letter-spacing:-.03em;line-height:1}
.tblk-sub{font-size:.68rem;color:var(--t4);margin-top:4px}
.tdiv{width:1px;height:52px;background:var(--border)}

.shd{display:flex;align-items:baseline;gap:10px;margin:24px 0 10px;padding:0 2px}
.shd-t{font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--t3)}
.shd-e{font-size:.62rem;color:var(--t4);letter-spacing:.1em}
.shd-l{flex:1;height:1px;background:var(--border)}

.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
.pr{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .14s;gap:12px}
.pr:last-child{border-bottom:none}
.pr:hover{background:var(--subtle)}
.pr.hl{background:var(--accent-bg)}
.pr.hl:hover{background:#EFE8DA}
.pr-dot{width:6px;height:6px;border-radius:50%;background:var(--border-mid);flex-shrink:0}
.pr.hl .pr-dot{background:var(--accent2)}
.pr-name{flex:1;font-size:.9rem;color:var(--t2)}
.pr.hl .pr-name{color:var(--t1);font-weight:500}
.pr-time{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--t1);direction:ltr;letter-spacing:-.01em}
.pr.hl .pr-time{color:var(--accent)}

.ans{display:flex;flex-direction:column;gap:8px}
.an{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;box-shadow:var(--sh-sm);transition:box-shadow .18s,transform .18s}
.an:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.an-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.an-ico{width:32px;height:32px;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.an-ttl{font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--t1);line-height:1.3;padding-top:2px}
.an-bod{font-size:.84rem;color:var(--t3);line-height:1.7;padding-right:44px}

.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;box-shadow:var(--sh-sm);position:relative}
.tc-q{font-family:'DM Serif Display',serif;font-size:5rem;color:var(--border);line-height:1;position:absolute;top:12px;left:20px;user-select:none}
.tc-txt{font-family:'Frank Ruhl Libre',serif;font-size:1.02rem;color:var(--t2);line-height:1.85;position:relative;z-index:1}

.pub-ft{text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
.pub-ft-n{font-size:.78rem;color:var(--t4);letter-spacing:.06em}
.pub-ft-u{font-size:.68rem;color:var(--t4);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.pub-ft-ud{width:4px;height:4px;border-radius:50%;background:var(--border-mid)}

/* ═══ LOGIN MODAL ═══ */
.lcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px 36px;width:100%;max-width:340px;box-shadow:var(--sh-lg);text-align:center;animation:fu .4s ease}
.lmark{width:52px;height:52px;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 18px}
.ltitle{font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;font-weight:700;color:var(--t1);margin-bottom:6px}
.lsub{font-size:.82rem;color:var(--t3);margin-bottom:26px}
.linput{width:100%;background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--t1);text-align:center;letter-spacing:.25em;direction:ltr;outline:none;margin-bottom:12px;transition:border-color .18s,box-shadow .18s}
.linput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,106,62,.1)}
.lerr{font-size:.78rem;color:#C0392B;min-height:18px;margin-top:6px}

/* ═══ ADMIN ═══ */
#adm-scr{max-width:700px;margin:0 auto;padding:28px 16px 80px}
.a-title{font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;font-weight:900;color:var(--t1);margin-bottom:4px;letter-spacing:-.02em}
.a-sub{font-size:.8rem;color:var(--t3);margin-bottom:28px}

.ac{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh-sm)}
.ac-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none;transition:background .14s}
.ac-hd:hover{background:var(--subtle)}
.ac-hl{display:flex;align-items:center;gap:12px}
.ac-ico{width:32px;height:32px;background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.ac-ttl{font-size:.88rem;font-weight:600;color:var(--t1)}
.ac-chev{color:var(--t4);font-size:.65rem;transition:transform .2s}
.ac.open .ac-chev{transform:rotate(180deg)}
.ac-body{display:none;padding:0 20px 20px}
.ac.open .ac-body{display:block}
.ac-sep{height:1px;background:var(--border);margin:0 0 20px}

.fld{margin-bottom:14px}
.flbl{display:block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.finput,.ftarea{width:100%;background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--t1);direction:rtl;outline:none;transition:border-color .18s,box-shadow .18s}
.finput:focus,.ftarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,106,62,.08);background:var(--card)}
.ftarea{min-height:88px;resize:vertical;line-height:1.65}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.prw{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;transition:box-shadow .15s}
.prw:focus-within{box-shadow:0 0 0 2px rgba(139,106,62,.12);border-color:var(--accent-bd)}
.prw-n{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--t1);direction:rtl}
.prw-t{width:64px;background:none;border:none;outline:none;font-family:'DM Serif Display',serif;font-size:1rem;color:var(--t1);direction:ltr;text-align:center}
.prw-hl{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t4);cursor:pointer;font-size:.68rem;padding:3px 7px;transition:all .15s;white-space:nowrap}
.prw-hl.on{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);font-weight:600}
.prw-del{background:none;border:none;color:var(--t4);cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:4px;transition:color .15s,background .15s;line-height:1}
.prw-del:hover{color:#C0392B;background:#FEF2F2}

.anw{background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;transition:box-shadow .15s}
.anw:focus-within{box-shadow:0 0 0 2px rgba(139,106,62,.12);border-color:var(--accent-bd)}
.anw-t{width:100%;background:none;border:none;outline:none;font-family:'Frank Ruhl Libre',serif;font-size:1rem;font-weight:700;color:var(--t1);direction:rtl;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.anw-b{width:100%;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.84rem;color:var(--t2);line-height:1.65;direction:rtl;resize:vertical;min-height:56px}
.anw-ft{display:flex;justify-content:flex-end;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:50px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;transition:all .18s ease;line-height:1}
.btn-p{background:var(--t1);color:#fff}
.btn-p:hover{background:var(--t2);transform:translateY(-1px);box-shadow:var(--sh-md)}
.btn-o{background:var(--card);color:var(--t1);border:1px solid var(--border)}
.btn-o:hover{background:var(--subtle);border-color:var(--border-mid)}
.btn-a{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd)}
.btn-a:hover{background:#EFE8DA}
.btn-gd{background:none;color:var(--t4);border:none;font-size:.8rem;padding:5px 10px}
.btn-gd:hover{color:#C0392B;background:#FEF2F2}
.btn-add{width:100%;background:none;border:1px dashed var(--border-mid);color:var(--t3);border-radius:var(--r-sm);padding:9px;justify-content:center;font-size:.82rem;margin-top:4px}
.btn-add:hover{border-color:var(--accent-bd);color:var(--accent);background:var(--accent-bg)}

.abar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;margin-top:16px;box-shadow:var(--sh-sm)}
.abar-r{margin-right:auto}
.smsg{font-size:.76rem;color:var(--t4);display:flex;align-items:center;gap:5px}
.smsg.ok{color:var(--green)}.smsg.err{color:#C0392B}

/* ═══ PRINT ═══ */
#pv{position:fixed;inset:0;z-index:9000;background:rgba(247,246,242,.96);backdrop-filter:blur(6px);overflow-y:auto;display:none}
#pv.on{display:block}
.ptop{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);z-index:1}
.ptop-lbl{font-size:.82rem;font-weight:600;color:var(--t2)}
.ptop-btns{display:flex;gap:8px}
#pc{width:420px;margin:28px auto 60px;background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--t1);color:#fff;padding:11px 22px;border-radius:50px;font-size:.82rem;font-weight:500;z-index:9998;box-shadow:var(--sh-lg);transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .h-title{font-size:1.5rem}.tblk-val{font-size:2rem}.frow{grid-template-columns:1fr}
  #pc{width:100%;border-radius:0;margin-top:68px}
}
</style>
</head>
<body>

<div id="ld"><div class="ring"></div></div>

/* STORAGE */
async function boot(){
  if(window._firebaseReady && window._db){
    const {doc,getDoc,onSnapshot}=window._fsImports;
    try{
      const ref=doc(window._db,'bulletin','main');
      const snap=await getDoc(ref);
      if(snap.exists()) D={...DEF,...snap.data()};
      onSnapshot(ref,s=>{if(s.exists()){D={...DEF,...s.data()};renderPub();}});
      document.getElementById('fdot').classList.add('on');
    }catch(e){loadLocal();}
  }else loadLocal();
  if(D.pwd) PWD = D.pwd;
  renderPub();
  if(authed) fillAdm();
  const ld=document.getElementById('ld');
  ld.classList.add('out');
  setTimeout(()=>ld.style.display='none',400);
}

function loadLocal(){try{const s=localStorage.getItem('syn3');if(s)D={...DEF,...JSON.parse(s)};}catch(e){}}

async function save(){
  collectAdm();
  D.updatedAt=new Date().toISOString();
  const btn=document.querySelector('.btn-p');
  btn.textContent='⏳ שומר...';btn.disabled=true;
  if(window._firebaseReady && window._db){
    const {doc,setDoc}=window._fsImports;
    try{await setDoc(doc(window._db,'bulletin','main'),D);setSM('✓ נשמר ב-Firebase','ok');}
    catch(e){localStorage.setItem('syn3',JSON.stringify(D));setSM('נשמר מקומית','err');}
  }else{localStorage.setItem('syn3',JSON.stringify(D));setSM('✓ נשמר מקומית','ok');}
  renderPub();
  showToast('✓ השינויים נשמרו');
  btn.textContent='💾 שמור שינויים';btn.disabled=false;
}

function setSM(t,c){const el=document.getElementById('smsg');el.textContent=t;el.className='smsg '+c;setTimeout(()=>{el.textContent='';el.className='smsg';},4000);}

/* ADMIN FORM */
function fillAdm(){
  document.getElementById('fnh').value=D.nameHe||'';
  document.getElementById('fne').value=D.nameEn||'';
  document.getElementById('fpa').value=D.parasha||'';
  document.getElementById('fen').value=D.entry||'';
  document.getElementById('fex').value=D.exit||'';
  document.getElementById('fto').value=D.torah||'';
  rPrl();rAnl();
}
function rPrl(){
  const container = document.getElementById('prl');
  container.innerHTML=(D.prayers||[]).map((p,i)=>`
    <div class="prw" data-i="${i}">
      <input class="prw-n" type="text" value="${escH(p.name)}" placeholder="שם תפילה" data-field="name" data-i="${i}">
      <input class="prw-t" type="text" value="${escH(p.time)}" placeholder="00:00" data-field="time" data-i="${i}">
      <button class="prw-hl ${p.hl?'on':''}" data-action="hl" data-i="${i}">★</button>
      <button class="prw-del" data-action="del" data-i="${i}" title="מחק">✕</button>
    </div>`).join('');
  // re-clone container to wipe all old listeners
  const fresh = container.cloneNode(false);
  fresh.innerHTML = container.innerHTML;
  container.parentNode.replaceChild(fresh, container);
  fresh.addEventListener('input', e=>{
    const inp = e.target.closest('input[data-field]');
    if(!inp) return;
    D.prayers[+inp.dataset.i][inp.dataset.field] = inp.value;
  });
  fresh.addEventListener('click', e=>{
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const idx = +btn.dataset.i;
    if(btn.dataset.action==='del'){ D.prayers.splice(idx,1); rPrl(); }
    else if(btn.dataset.action==='hl'){ D.prayers[idx].hl=!D.prayers[idx].hl; rPrl(); }
  });
}
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function rAnl(){
  document.getElementById('anl').innerHTML=(D.announcements||[]).map((a,i)=>`
    <div class="anw">
      <input class="anw-t" type="text" value="${a.title}" placeholder="כותרת" oninput="D.announcements[${i}].title=this.value">
      <textarea class="anw-b" oninput="D.announcements[${i}].body=this.value">${a.body}</textarea>
      <div class="anw-ft"><button class="btn btn-gd" onclick="delAn(${i})">✕ מחק</button></div>
    </div>`).join('');
}

/* NAV */
function goScreen(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));

  document.getElementById(id+'-scr').classList.add('on');

  else document.querySelectorAll('.pill')[1].classList.add('on');
}

}

}
function closeLogin(){
  document.getElementById('login-modal').style.display='none';

  document.getElementById('pw').value='';
}
function tryLogin(){
  if(document.getElementById('pw').value===PWD){
    authed=true;sessionStorage.setItem('adm','1');
    document.getElementById('login-modal').style.display='none';
    document.getElementById('pw').value='';
    fillAdm();goScreen('adm');showToast('ברוך הבא 👋');
  }else{

    document.getElementById('pw').value='';

  }
}
function logout(){authed=false;sessionStorage.removeItem('adm');goScreen('pub');showToast('יצאת בהצלחה');}
async function changePwd(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const nw2=document.getElementById('pw-new2').value;
  const msg=document.getElementById('pwd-msg');
  if(cur!==PWD){msg.style.color='#C0392B';msg.textContent='❌ הסיסמה הנוכחית שגויה';return;}
  if(nw.length<6){msg.style.color='#C0392B';msg.textContent='❌ הסיסמה חייבת להכיל לפחות 6 תווים';return;}
  if(nw!==nw2){msg.style.color='#C0392B';msg.textContent='❌ הסיסמאות אינן תואמות';return;}
  PWD=nw;
  D.pwd=nw;
  // שמור ב-Firebase
  if(window._firebaseReady && window._db){
    const {doc,setDoc}=window._fsImports;
    try{
      await setDoc(doc(window._db,'bulletin','main'),D);
    }catch(e){
      localStorage.setItem('syn_pwd',PWD);
    }
  } else {
    localStorage.setItem('syn_pwd',PWD);
  }
  document.getElementById('pw-cur').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-new2').value='';
  msg.style.color='#4A7C59';
  msg.textContent='✓ הסיסמה שונתה בהצלחה';
  setTimeout(()=>msg.textContent='',3000);
  showToast('✓ הסיסמה עודכנה!');
}

async function exportPNG(){
  showToast('מכין תמונה...');
  const c=await html2canvas(document.getElementById('pc'),{backgroundColor:'#fff',scale:2,useCORS:true,logging:false});
  const a=document.createElement('a');a.download=`shabbat_${D.parasha.replace(/\s/g,'_')}.png`;a.href=c.toDataURL('image/png');a.click();
  showToast('✓ התמונה הורדה!');
}
async function exportPDF(){
  showToast('מכין PDF...');
  const c=await html2canvas(document.getElementById('pc'),{backgroundColor:'#fff',scale:2,useCORS:true});
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const w=pdf.internal.pageSize.getWidth();
  pdf.addImage(c.toDataURL('image/png'),'PNG',0,0,w,(c.height*w)/c.width);
  pdf.save(`shabbat_${D.parasha.replace(/\s/g,'_')}.pdf`);
  showToast('✓ PDF הורד!');
}

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// PWA Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('pwa-banner');
  banner.style.display = 'flex';
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('pwa-banner').style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner').style.display = 'none';
});
</script>
