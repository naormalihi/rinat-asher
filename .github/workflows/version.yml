name: Update Version

on:
  push:
    branches: [main]
    paths:
      - 'synagogue-bulletin.html'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version timestamp
        run: |
          VERSION="v$(date +'%Y.%m.%d.%H%M' -u)"
          echo "Setting version: $VERSION"
          sed -i "s/v[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}\.[0-9]\{4\}/$VERSION/g" synagogue-bulletin.html
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add synagogue-bulletin.html
          git diff --staged --quiet || git commit -m "🔖 גרסה ${{ env.VERSION }}"
          git push
